<style>
@font-face{
font-family: Roboto;
src: url('Roboto-Regular.ttf');
}
*,
*::before,
*::after {
    margin: 0;
    padding: 0;
    -webkit-box-sizing: border-box;
    -moz-box-sizing: border-box;
    -o-box-sizing: border-box;
    box-sizing: border-box;
    color: #24305E;

}

.entry-header,
.entry-footer {
    display: none;
}

body {
    background: #EAEEF3;
    font-family: 'Roboto', sans-serif;

}
.container {
  width: 100%;
  padding-right: 15px;
  padding-left: 15px;
  margin-right: auto;
  margin-left: auto;
  display: flex;
}
h1 {
  font-size: 7.5em;
  margin: 15px 0px;
  font-weight: bold;
}
.m1, .m2
{
	display: inline-block;
	
}
.m1
{
	max-width: 40%;
	width: 40%;
	margin-top:auto;
	margin-bottom:auto;
	float: right;
	text-align: right;
	
}
.m2
{
	margin-top:auto;
	margin-bottom:auto;
	margin-left: 40px;
	text-align: left;
	max-width: 60%;
	width: 60%;
}
svg
{
	max-width: 100px;
	margin-top:auto;
	margin-bottom:auto;
	text-align: right;
}
.btn {
  
  z-index: 1;
  overflow: hidden;
  background: transparent;
  position: relative;
  padding: 8px 50px;
  border-radius: 30px;
  cursor: pointer;
  font-size: 1em;
  letter-spacing: 2px;
  transition: 0.2s ease;
  font-weight: bold;
  margin: 40px 0px;
  &.green {
    border: 2px solid #24305E;
    color: #24305E;
    &:before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 0%;
      height: 100%;
      background: #24305E;
      z-index: -1;
      transition: 0.2s ease;
    }
    &:hover {
      color: #ffffff;
      background: #24305E;
      transition: 0.2s ease;
      &:before {
        width: 100%;
      }
    }
  }
 }

@media screen and (max-width:768px) {
 h1 {
  font-size: 30px;
  margin: 15px 0px;
  font-weight: bold;
}
  .container {
    margin-top:70px;
    margin-bottom:70px;
  }
} 
</style>
